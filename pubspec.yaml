name: eden_ui_flutter
description: Eden UI component library for Flutter — ported from the Eden UI Rails framework.
version: 1.0.0-rc.1

environment:
  sdk: ">=3.2.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  highlight: ^0.7.0
  flutter_highlight: ^0.7.0
  showcaseview: ^5.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
